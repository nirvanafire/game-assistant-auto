<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Game Assistant</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }
    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .ant-splitter-panel {

</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
