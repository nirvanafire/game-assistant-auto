appId: com.game-assistant.auto
productName: Game Assistant
directories:
  output: dist
files:
  - "**/*"
extraResources:
  - from: "bin/"
    to: "python-service"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
